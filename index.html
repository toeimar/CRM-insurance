<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova CRM - Insurance Platform</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "recharts": "https://esm.sh/recharts@2.12.0?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.359.0?deps=react@18.2.0"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip as RechartsTooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell, AreaChart, Area
    } from 'recharts';
    import {
      Home, Users, Target, Calendar, PieChart as PieIcon, Settings, LogOut,
      Plus, Bell, Search, Edit2, Phone, MessageSquare, BrainCircuit,
      ChevronRight, Activity, TrendingUp, AlertCircle, CheckCircle2, UserPlus, FileText, Gift,
      Menu, X, Briefcase, Filter, Trophy, BarChart3, Database, Save, Trash2, ShieldCheck, Mail, Lock, User, Star, Clock, Sparkles, Send, Bot, ChevronDown
    } from 'lucide-react';

    // --- CONFIG & CONSTANTS ---
    const ADMIN_EMAIL = "toei.mar168@gmail.com";
    const STATUS_LIST = ['ลีดใหม่', 'นัดหมาย', 'เสนอแบบ', 'ติดตามผล', 'ปิดการขาย'];
    const CHART_COLORS = ['#3b82f6', '#f97316', '#10b981', '#8b5cf6', '#ec4899'];

    // --- UTILITIES ---
    const formatCurrency = (val) => new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', maximumFractionDigits: 0 }).format(val || 0);
    const calculateAge = (dob) => {
      if(!dob) return 0;
      const diff_ms = Date.now() - new Date(dob).getTime();
      const age_dt = new Date(diff_ms);
      return Math.abs(age_dt.getUTCFullYear() - 1970);
    };
    const toBuddhistYear = (dateStr) => {
      if(!dateStr) return '-';
      const d = new Date(dateStr);
      return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear() + 543}`;
    };
    const getTodayStr = () => new Date().toISOString().split('T')[0];

    // --- REAL CLAUDE API CALL ---
    async function callClaudeAPI(messages, systemPrompt = "") {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { 
          "Content-Type": "application/json",
          "x-api-key": "YOUR_API_KEY_HERE", // เพิ่ม API Key ถ้ามีการเรียกตรงๆ (แต่ระวังการเปิดเผย API Key บน Github Pages)
          "anthropic-version": "2023-06-01" 
        },
        body: JSON.stringify({
          model: "claude-3-sonnet-20240229",
          max_tokens: 1000,
          system: systemPrompt,
          messages
        })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      return data.content.map(i => i.text || "").filter(Boolean).join("\n");
    }

    // ============================================================================
    // MAIN APPLICATION COMPONENT
    // ============================================================================
    function InsuranceCRMProduction() {
      const [users, setUsers] = useState([]);
      const [customers, setCustomers] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [currentUser, setCurrentUser] = useState(null);
      const [currentRoute, setCurrentRoute] = useState('home');
      const [isSidebarOpen, setSidebarOpen] = useState(false);

      const handleAuth = (email, password, name, team, isLogin) => {
        if (isLogin) {
          const user = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);
          if (user) { setCurrentUser(user); setCurrentRoute('home'); }
          else alert("รหัสผ่านหรืออีเมลไม่ถูกต้อง กรุณาลองใหม่");
        } else {
          const existingUser = users.find(u => u.email.toLowerCase() === email.toLowerCase());
          if (existingUser) { alert("อีเมลนี้มีการลงทะเบียนแล้ว กรุณาเข้าสู่ระบบ"); return; }
          const role = email.toLowerCase() === ADMIN_EMAIL.toLowerCase() ? 'admin' : 'agent';
          const newUser = { id: Date.now().toString(), name, email, password, team: role === 'admin' ? 'HQ Management' : team, role, targetRevenue: 100000 };
          setUsers(prev => [...prev, newUser]);
          setCurrentUser(newUser);
          setCurrentRoute('home');
        }
      };

      useEffect(() => {
        if (currentUser) {
          const updated = users.find(u => u.id === currentUser.id);
          if (updated) setCurrentUser(updated);
        }
      }, [users]);

      const addCustomer = (data) => setCustomers(prev => [...prev, { ...data, id: Date.now().toString(), agent_id: currentUser.id }]);
      const updateCustomer = (data) => setCustomers(prev => prev.map(c => c.id === data.id ? data : c));
      const deleteCustomer = (id) => setCustomers(prev => prev.filter(c => c.id !== id));
      const addTask = (data) => setTasks(prev => [...prev, { ...data, id: Date.now().toString(), agent_id: currentUser.id }]);
      const toggleTask = (id) => setTasks(prev => prev.map(t => t.id === id ? { ...t, status: t.status === 'completed' ? 'pending' : 'completed' } : t));
      const removeTask = (id) => setTasks(prev => prev.filter(t => t.id !== id));

      if (!currentUser) return <AuthView onAuth={handleAuth} users={users} />;

      const navItems = currentUser.role === 'agent' ? [
        { route: 'home', icon: Home, label: 'แดชบอร์ด', color: 'text-blue-600', bg: 'bg-blue-50 border-blue-200' },
        { route: 'add-lead', icon: UserPlus, label: 'เพิ่ม Lead ใหม่', color: 'text-orange-500', bg: 'bg-orange-50 border-orange-200' },
        { route: 'customers', icon: Users, label: 'ฐานลูกค้า', color: 'text-emerald-500', bg: 'bg-emerald-50 border-emerald-200' },
        { route: 'pipeline', icon: Filter, label: 'Sales Pipeline', color: 'text-purple-500', bg: 'bg-purple-50 border-purple-200' },
        { route: 'analytics', icon: TrendingUp, label: 'Analytics & KPI', color: 'text-pink-500', bg: 'bg-pink-50 border-pink-200' },
        { route: 'ai-assistant', icon: BrainCircuit, label: 'AI Assistant', color: 'text-indigo-500', bg: 'bg-indigo-50 border-indigo-200' },
        { route: 'ranking', icon: Trophy, label: 'Team Ranking', color: 'text-yellow-500', bg: 'bg-yellow-50 border-yellow-200' },
      ] : [
        { route: 'home', icon: Home, label: 'ภาพรวมองค์กร', color: 'text-indigo-600', bg: 'bg-indigo-50 border-indigo-200' },
        { route: 'admin-customers', icon: Database, label: 'ฐานข้อมูลทั้งหมด', color: 'text-emerald-600', bg: 'bg-emerald-50 border-emerald-200' },
      ];

      return (
        <div className="flex h-screen bg-slate-50 overflow-hidden font-sans text-slate-800">
          <style>{`.custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; } .custom-scrollbar::-webkit-scrollbar-track { background: transparent; } .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 99px; } .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; } @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } } .animate-in { animation: fadeIn 0.4s ease forwards; } @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} } .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; } @keyframes spin { to { transform: rotate(360deg); } } .animate-spin { animation: spin 1s linear infinite; } .typing-dots::after { content:'...'; animation: typingDots 1.2s steps(4,end) infinite; } @keyframes typingDots { 0%,20%{color:transparent;text-shadow:.25em 0 0 transparent,.5em 0 0 transparent} 40%{color:inherit;text-shadow:.25em 0 0 transparent,.5em 0 0 transparent} 60%{text-shadow:.25em 0 0 inherit,.5em 0 0 transparent} 80%,100%{text-shadow:.25em 0 0 inherit,.5em 0 0 inherit} }`}</style>
          
          {isSidebarOpen && <div className="fixed inset-0 bg-slate-900/50 z-40 lg:hidden backdrop-blur-sm" onClick={() => setSidebarOpen(false)} />}
          
          <aside className={`fixed lg:static inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0 transition-transform duration-300 flex flex-col shadow-2xl lg:shadow-none`}>
            <div className="h-20 flex items-center px-6 border-b border-slate-100">
              <div className="flex items-center gap-3 flex-1">
                <div className="bg-gradient-to-tr from-blue-600 to-indigo-600 p-2 rounded-2xl shadow-lg shadow-blue-500/30">
                  <Activity className="text-white" size={24} />
                </div>
                <span className="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 tracking-tight">Nova CRM</span>
              </div>
              <button className="lg:hidden text-slate-400 bg-slate-100 p-2 rounded-xl hover:bg-slate-200 transition" onClick={() => setSidebarOpen(false)}><X size={18}/></button>
            </div>
            
            <nav className="flex-1 overflow-y-auto p-4 space-y-1.5 custom-scrollbar">
              {navItems.map(item => (
                <MenuLink key={item.route} icon={item.icon} label={item.label} active={currentRoute === item.route} onClick={() => { setCurrentRoute(item.route); setSidebarOpen(false); }} color={item.color} bg={item.bg} />
              ))}
              <div className="pt-3 mt-3 border-t border-slate-100">
                <MenuLink icon={Settings} label="ตั้งค่าโปรไฟล์" active={currentRoute === 'settings'} onClick={() => { setCurrentRoute('settings'); setSidebarOpen(false); }} color="text-slate-600" bg="bg-slate-100 border-slate-200" />
              </div>
            </nav>

            <div className="p-4 bg-slate-50 border-t border-slate-200">
              <div className="flex items-center gap-3 mb-4">
                <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 flex items-center justify-center font-black text-white text-lg shadow-md border-2 border-white">
                  {currentUser.name.charAt(0)}
                </div>
                <div className="truncate flex-1">
                  <p className="text-sm font-black text-slate-800 truncate">{currentUser.name}</p>
                  <p className="text-[9px] font-bold text-slate-500 bg-slate-200 inline-block px-2 py-0.5 rounded-md mt-0.5 uppercase tracking-widest">{currentUser.role === 'admin' ? 'ADMINISTRATOR' : currentUser.team}</p>
                </div>
              </div>
              <button onClick={() => setCurrentUser(null)} className="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl bg-white border-2 border-slate-200 text-slate-600 hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-all font-black text-sm shadow-sm">
                <LogOut size={16} /> ออกจากระบบ
              </button>
            </div>
          </aside>

          <main className="flex-1 overflow-auto relative bg-slate-50/50">
            <header className="h-16 bg-white/80 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-30 px-4 lg:px-8 flex items-center justify-between shadow-sm">
              <div className="flex items-center gap-3">
                <button className="lg:hidden p-2 bg-white border-2 border-slate-200 rounded-xl shadow-sm text-slate-600 hover:bg-slate-50 transition" onClick={() => setSidebarOpen(true)}>
                  <Menu size={20} />
                </button>
                <div>
                  <h1 className="text-lg font-black text-slate-800 uppercase tracking-tight">
                    {navItems.find(n => n.route === currentRoute)?.label || 'ตั้งค่า'}
                  </h1>
                </div>
              </div>
              <div className="flex items-center gap-3">
                <div className="hidden sm:flex items-center gap-2 bg-emerald-50 px-3 py-1.5 rounded-xl border border-emerald-100">
                  <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                  <span className="text-xs font-black text-emerald-700 uppercase tracking-widest">Online</span>
                </div>
              </div>
            </header>

            <div className="p-4 lg:p-8 max-w-[1600px] mx-auto space-y-8 pb-16">
              {currentUser.role === 'admin' ? (
                <>
                  {currentRoute === 'home' && <AdminHomeView users={users} customers={customers} />}
                  {currentRoute === 'admin-customers' && <AdminCustomersView customers={customers} users={users} updateCustomer={updateCustomer} deleteCustomer={deleteCustomer} />}
                  {currentRoute === 'settings' && <SettingsView user={currentUser} setUsers={setUsers} users={users} />}
                </>
              ) : (
                <>
                  {currentRoute === 'home' && <AgentHomeView user={currentUser} customers={customers} tasks={tasks} addTask={addTask} toggleTask={toggleTask} removeTask={removeTask} setUsers={setUsers} users={users} updateCustomer={updateCustomer} deleteCustomer={deleteCustomer} />}
                  {currentRoute === 'add-lead' && <AddLeadView onAdd={addCustomer} setRoute={setCurrentRoute} />}
                  {currentRoute === 'customers' && <CustomersView user={currentUser} customers={customers} updateCustomer={updateCustomer} deleteCustomer={deleteCustomer} />}
                  {currentRoute === 'pipeline' && <PipelineView customers={customers.filter(c => c.agent_id === currentUser.id)} />}
                  {currentRoute === 'analytics' && <AnalyticsView customers={customers.filter(c => c.agent_id === currentUser.id)} user={currentUser} />}
                  {currentRoute === 'ranking' && <RankingView users={users} customers={customers} currentUser={currentUser} />}
                  {currentRoute === 'ai-assistant' && <AIAssistantView user={currentUser} customers={customers.filter(c => c.agent_id === currentUser.id)} />}
                  {currentRoute === 'settings' && <SettingsView user={currentUser} setUsers={setUsers} users={users} />}
                </>
              )}
            </div>
          </main>
        </div>
      );
    }

    // ============================================================================
    // REUSABLE COMPONENTS
    // ============================================================================
    function MenuLink({ icon: Icon, label, active, onClick, color, bg }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-bold text-sm group ${active ? `${bg} ${color} border-2 shadow-sm` : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800 border-2 border-transparent'}`}>
          <Icon size={18} className={active ? color : 'text-slate-400'} />
          {label}
        </button>
      );
    }

    function LoadingSpinner({ text = "กำลังประมวลผล..." }) {
      return (
        <div className="flex items-center gap-3 text-indigo-300">
          <div className="w-5 h-5 border-2 border-indigo-400 border-t-transparent rounded-full animate-spin"></div>
          <span className="font-bold text-sm">{text}</span>
        </div>
      );
    }

    // ============================================================================
    // AUTH VIEW
    // ============================================================================
    function AuthView({ onAuth, users }) {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [name, setName] = useState('');
      const [team, setTeam] = useState('');

      const detectMode = (val) => {
        const exists = users.find(u => u.email.toLowerCase() === val.toLowerCase());
        if (val.includes('@')) setIsLogin(!!exists);
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        onAuth(email, password, name, team, isLogin);
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 via-blue-950 to-indigo-950">
          <div className="bg-white/95 backdrop-blur-2xl rounded-3xl shadow-2xl p-8 w-full max-w-md relative z-10 border border-white/20">
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-blue-500/40">
                <Activity className="text-white" size={32} />
              </div>
              <h2 className="text-3xl font-black text-slate-800 tracking-tight">Nova CRM</h2>
            </div>
            <div className="flex bg-slate-100 p-1.5 rounded-2xl mb-6 border border-slate-200">
              <button type="button" onClick={() => setIsLogin(true)} className={`flex-1 py-2.5 font-black text-sm rounded-xl transition-all ${isLogin ? 'bg-white text-blue-600 shadow-md' : 'text-slate-500 hover:text-slate-800'}`}>เข้าสู่ระบบ</button>
              <button type="button" onClick={() => setIsLogin(false)} className={`flex-1 py-2.5 font-black text-sm rounded-xl transition-all ${!isLogin ? 'bg-white text-blue-600 shadow-md' : 'text-slate-500 hover:text-slate-800'}`}>ลงทะเบียนใหม่</button>
            </div>
            <form onSubmit={handleSubmit} className="space-y-4">
              <div className="space-y-1.5">
                <label className="text-xs font-black text-slate-600 uppercase tracking-widest">อีเมล</label>
                <div className="relative">
                  <Mail className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={16}/>
                  <input required type="email" value={email} onChange={e=>{ setEmail(e.target.value); detectMode(e.target.value); }} className="w-full pl-11 pr-4 py-3.5 rounded-xl bg-white border-2 border-slate-200 focus:border-blue-500 outline-none font-bold text-slate-800 transition" placeholder="name@example.com" />
                </div>
              </div>
              {!isLogin && (
                <>
                  <div className="space-y-1.5">
                    <label className="text-xs font-black text-slate-600 uppercase tracking-widest">ชื่อ - นามสกุล</label>
                    <div className="relative">
                      <User className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={16}/>
                      <input required={!isLogin} type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full pl-11 pr-4 py-3.5 rounded-xl bg-white border-2 border-slate-200 focus:border-blue-500 outline-none font-bold text-slate-800 transition" placeholder="ระบุชื่อจริง นามสกุล" />
                    </div>
                  </div>
                  {email.toLowerCase() !== ADMIN_EMAIL.toLowerCase() && (
                    <div className="space-y-1.5">
                      <label className="text-xs font-black text-slate-600 uppercase tracking-widest">ชื่อทีม</label>
                      <div className="relative">
                        <Users className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={16}/>
                        <input required={!isLogin && email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()} type="text" value={team} onChange={e=>setTeam(e.target.value)} className="w-full pl-11 pr-4 py-3.5 rounded-xl bg-white border-2 border-slate-200 focus:border-blue-500 outline-none font-bold text-slate-800 transition" placeholder="เช่น ทีมมังกรทอง" />
                      </div>
                    </div>
                  )}
                </>
              )}
              <div className="space-y-1.5">
                <label className="text-xs font-black text-slate-600 uppercase tracking-widest">{isLogin ? 'รหัสผ่าน' : 'ตั้งรหัสผ่านใหม่'}</label>
                <div className="relative">
                  <Lock className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={16}/>
                  <input required type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full pl-11 pr-4 py-3.5 rounded-xl bg-white border-2 border-slate-200 focus:border-blue-500 outline-none font-bold text-slate-800 transition" placeholder="••••••••" />
                </div>
              </div>
              <button type="submit" className="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-black rounded-2xl shadow-xl shadow-blue-500/30 transition-all transform hover:-translate-y-0.5 mt-2">
                {isLogin ? 'เข้าสู่ระบบ' : 'ลงทะเบียนและเริ่มต้นใช้งาน'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ============================================================================
    // AGENT HOME VIEW
    // ============================================================================
    function AgentHomeView({ user, customers, tasks, addTask, toggleTask, removeTask, setUsers, users, updateCustomer, deleteCustomer }) {
      const [isEditingTarget, setEditingTarget] = useState(false);
      const [tempTarget, setTempTarget] = useState(user.targetRevenue || 100000);
      const [newTaskStr, setNewTaskStr] = useState('');
      const [newTaskDate, setNewTaskDate] = useState(getTodayStr());
      
      const myCustomers = customers.filter(c => c.agent_id === user.id);
      const myTasks = tasks.filter(t => t.agent_id === user.id);
      
      const currentMonth = new Date().getMonth();
      const currentYear = new Date().getFullYear();
      const monthRev = myCustomers.reduce((acc, c) => {
        if (c.status === 'ปิดการขาย' && c.closedDate) {
          const d = new Date(c.closedDate);
          if(d.getMonth() === currentMonth && d.getFullYear() === currentYear) return acc + (Number(c.premium) || 0);
        }
        return acc;
      }, 0);
      const progress = Math.min(100, Math.round((monthRev / (user.targetRevenue || 1)) * 100));

      return (
        <div className="space-y-8">
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-700 rounded-3xl p-8 text-white shadow-2xl relative overflow-hidden">
              <div className="relative z-10 flex flex-col md:flex-row justify-between items-start gap-6">
                <div>
                  <p className="text-blue-100 font-bold text-xs uppercase tracking-widest mb-2 flex items-center gap-2"><Target size={14}/> เป้ายอดขายเดือนนี้</p>
                  {isEditingTarget ? (
                    <div className="flex gap-2">
                      <input type="number" value={tempTarget} onChange={e=>setTempTarget(e.target.value)} className="bg-white text-slate-900 px-4 py-2.5 rounded-xl font-black w-40 text-xl focus:ring-4 focus:ring-orange-400/50 outline-none" />
                      <button onClick={() => { setUsers(users.map(u => u.id === user.id ? {...u, targetRevenue: Number(tempTarget)} : u)); setEditingTarget(false); }} className="bg-orange-500 px-5 rounded-xl font-black shadow-lg hover:bg-orange-600 transition">SAVE</button>
                    </div>
                  ) : (
                    <div className="flex items-center gap-3">
                      <h2 className="text-4xl lg:text-5xl font-black tracking-tighter">{formatCurrency(user.targetRevenue)}</h2>
                      <button onClick={() => setEditingTarget(true)} className="p-2 bg-white/20 rounded-full hover:bg-white/30 transition"><Edit2 size={16}/></button>
                    </div>
                  )}
                </div>
                <div className="bg-white/10 p-5 rounded-2xl border border-white/20 backdrop-blur-md w-full md:w-auto shadow-inner">
                  <p className="text-blue-100 font-bold text-xs uppercase tracking-widest mb-1">ยอดขายที่ทำได้</p>
                  <h3 className="text-3xl font-black text-amber-300">{formatCurrency(monthRev)}</h3>
                </div>
              </div>
              <div className="mt-8 relative z-10">
                <div className="flex justify-between text-xs font-black uppercase tracking-widest mb-2">
                  <span className="text-blue-100">ความคืบหน้า</span>
                  <span className="bg-white text-blue-800 px-2.5 py-1 rounded-lg">{progress}%</span>
                </div>
                <div className="h-4 bg-blue-900/50 rounded-full overflow-hidden p-0.5 border border-white/10">
                  <div className="h-full bg-gradient-to-r from-amber-400 to-orange-500 rounded-full transition-all duration-1000 shadow-[0_0_16px_rgba(245,158,11,0.5)]" style={{width: `${progress}%`}}></div>
                </div>
              </div>
            </div>

            <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 flex flex-col">
              <h4 className="font-black text-slate-800 text-lg flex items-center gap-2 mb-4"><Star className="text-yellow-400" size={22}/> สรุปภาพรวม</h4>
              {[
                { label: 'ลูกค้าทั้งหมด', val: myCustomers.length, color: 'text-blue-600', bg: 'bg-blue-50' },
                { label: 'ปิดการขายแล้ว', val: myCustomers.filter(c=>c.status==='ปิดการขาย').length, color: 'text-emerald-600', bg: 'bg-emerald-50' },
                { label: 'รอติดตาม', val: myCustomers.filter(c=>['นัดหมาย','เสนอแบบ','ติดตามผล'].includes(c.status)).length, color: 'text-orange-600', bg: 'bg-orange-50' },
                { label: 'งานค้างทำ', val: myTasks.filter(t=>t.status==='pending').length, color: 'text-purple-600', bg: 'bg-purple-50' },
              ].map((item, i) => (
                <div key={i} className={`flex justify-between items-center p-4 rounded-2xl ${item.bg} mb-2 last:mb-0`}>
                  <span className="text-xs font-black text-slate-500 uppercase tracking-widest">{item.label}</span>
                  <span className={`text-2xl font-black ${item.color}`}>{item.val}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // --- ส่วนประกอบอื่นๆ นำมาเรียงต่อได้เลย เช่น AddLeadView, CustomersView, PipelineView, AnalyticsView, RankingView, AIAssistantView, AdminHomeView ---
