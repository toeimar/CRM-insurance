<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova CRM</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
  <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    import React, { useState, useEffect, useMemo, useRef } from 'react';
import { 
  LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip as RechartsTooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell, AreaChart, Area
} from 'recharts';
import { 
  Home, Users, Target, Calendar, PieChart as PieIcon, Settings, LogOut, 
  Plus, Bell, Search, Edit2, Phone, MessageSquare, BrainCircuit, 
  ChevronRight, Activity, TrendingUp, AlertCircle, CheckCircle2, UserPlus, FileText, Gift,
  Menu, X, Briefcase, Filter, Trophy, BarChart3, Database, Save, Trash2, ShieldCheck, Mail, Lock, User, Star, Clock, Sparkles, Send, Bot, ChevronDown
} from 'lucide-react';

// --- CONFIG & CONSTANTS ---
const ADMIN_EMAIL = "toei.mar168@gmail.com";
const STATUS_LIST = ['ลีดใหม่', 'นัดหมาย', 'เสนอแบบ', 'ติดตามผล', 'ปิดการขาย'];
const CHART_COLORS = ['#3b82f6', '#f97316', '#10b981', '#8b5cf6', '#ec4899'];

// --- UTILITIES ---
const formatCurrency = (val) => new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', maximumFractionDigits: 0 }).format(val || 0);
const calculateAge = (dob) => {
  if(!dob) return 0;
  const diff_ms = Date.now() - new Date(dob).getTime();
  const age_dt = new Date(diff_ms); 
  return Math.abs(age_dt.getUTCFullYear() - 1970);
};
const toBuddhistYear = (dateStr) => {
  if(!dateStr) return '-';
  const d = new Date(dateStr);
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear() + 543}`;
};
const getTodayStr = () => new Date().toISOString().split('T')[0];

// --- REAL CLAUDE API CALL ---
async function callClaudeAPI(messages, systemPrompt = "") {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      messages
    })
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.map(i => i.text || "").filter(Boolean).join("\n");
}

// ============================================================================
// MAIN APPLICATION COMPONENT
// ============================================================================
export default function InsuranceCRMProduction() {
  const [users, setUsers] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [currentUser, setCurrentUser] = useState(null);
  const [currentRoute, setCurrentRoute] = useState('home');
  const [isSidebarOpen, setSidebarOpen] = useState(false);

  const handleAuth = (email, password, name, team, isLogin) => {
    if (isLogin) {
      const user = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);
      if (user) { setCurrentUser(user); setCurrentRoute('home'); }
      else alert("รหัสผ่านหรืออีเมลไม่ถูกต้อง กรุณาลองใหม่");
    } else {
      const existingUser = users.find(u => u.email.toLowerCase() === email.toLowerCase());
      if (existingUser) { alert("อีเมลนี้มีการลงทะเบียนแล้ว กรุณาเข้าสู่ระบบ"); return; }
      const role = email.toLowerCase() === ADMIN_EMAIL.toLowerCase() ? 'admin' : 'agent';
      const newUser = { id: Date.now().toString(), name, email, password, team: role === 'admin' ? 'HQ Management' : team, role, targetRevenue: 100000 };
      setUsers(prev => [...prev, newUser]);
      setCurrentUser(newUser);
      setCurrentRoute('home');
    }
  };

  // Sync currentUser when users state changes (e.g. after profile update)
  useEffect(() => {
    if (currentUser) {
      const updated = users.find(u => u.id === currentUser.id);
      if (updated) setCurrentUser(updated);
    }
  }, [users]);

  const addCustomer = (data) => setCustomers(prev => [...prev, { ...data, id: Date.now().toString(), agent_id: currentUser.id }]);
  const updateCustomer = (data) => setCustomers(prev => prev.map(c => c.id === data.id ? data : c));
  const deleteCustomer = (id) => setCustomers(prev => prev.filter(c => c.id !== id));
  const addTask = (data) => setTasks(prev => [...prev, { ...data, id: Date.now().toString(), agent_id: currentUser.id }]);
  const toggleTask = (id) => setTasks(prev => prev.map(t => t.id === id ? { ...t, status: t.status === 'completed' ? 'pending' : 'completed' } : t));
  const removeTask = (id) => setTasks(prev => prev.filter(t => t.id !== id));

  if (!currentUser) return <AuthView onAuth={handleAuth} users={users} />;

  const navItems = currentUser.role === 'agent' ? [
    { route: 'home', icon: Home, label: 'แดชบอร์ด', color: 'text-blue-600', bg: 'bg-blue-50 border-blue-200' },
    { route: 'add-lead', icon: UserPlus, label: 'เพิ่ม Lead ใหม่', color: 'text-orange-500', bg: 'bg-orange-50 border-orange-200' },
    { route: 'customers', icon: Users, label: 'ฐานลูกค้า', color: 'text-emerald-500', bg: 'bg-emerald-50 border-emerald-200' },
    { route: 'pipeline', icon: Filter, label: 'Sales Pipeline', color: 'text-purple-500', bg: 'bg-purple-50 border-purple-200' },
    { route: 'analytics', icon: TrendingUp, label: 'Analytics & KPI', color: 'text-pink-500', bg: 'bg-pink-50 border-pink-200' },
    { route: 'ai-assistant', icon: BrainCircuit, label: 'AI Assistant', color: 'text-indigo-500', bg: 'bg-indigo-50 border-indigo-200' },
    { route: 'ranking', icon: Trophy, label: 'Team Ranking', color: 'text-yellow-500', bg: 'bg-yellow-50 border-yellow-200' },
  ] : [
    { route: 'home', icon: Home, label: 'ภาพรวมองค์กร', color: 'text-indigo-600', bg: 'bg-indigo-50 border-indigo-200' },
    { route: 'admin-customers', icon: Database, label: 'ฐานข้อมูลทั้งหมด', color: 'text-emerald-600', bg: 'bg-emerald-50 border-emerald-200' },
  ];

  return (
    <div className="flex h-screen bg-slate-50 overflow-hidden font-sans text-slate-800">
      <style>{`
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 99px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        .typing-dots::after { content:'...'; animation: typingDots 1.2s steps(4,end) infinite; }
        @keyframes typingDots { 0%,20%{color:transparent;text-shadow:.25em 0 0 transparent,.5em 0 0 transparent} 40%{color:inherit;text-shadow:.25em 0 0 transparent,.5em 0 0 transparent} 60%{text-shadow:.25em 0 0 inherit,.5em 0 0 transparent} 80%,100%{text-shadow:.25em 0 0 inherit,.5em 0 0 inherit} }
      `}</style>

      {isSidebarOpen && <div className="fixed inset-0 bg-slate-900/50 z-40 lg:hidden backdrop-blur-sm" onClick={() => setSidebarOpen(false)} />}
      
      <aside className={`fixed lg:static inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0 transition-transform duration-300 flex flex-col shadow-2xl lg:shadow-none`}>
        <div className="h-20 flex items-center px-6 border-b border-slate-100">
          <div className="flex items-center gap-3 flex-1">
            <div className="bg-gradient-to-tr from-blue-600 to-indigo-600 p-2 rounded-2xl shadow-lg shadow-blue-500/30">
              <Activity className="text-white" size={24} />
            </div>
            <span className="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 tracking-tight">Nova CRM</span>
          </div>
          <button className="lg:hidden text-slate-400 bg-slate-100 p-2 rounded-xl hover:bg-slate-200 transition" onClick={() => setSidebarOpen(false)}><X size={18}/></button>
        </div>
        
        <nav className="flex-1 overflow-y-auto p-4 space-y-1.5 custom-scrollbar">
          {navItems.map(item => (
            <MenuLink key={item.route} icon={item.icon} label={item.label} active={currentRoute === item.route} onClick={() => { setCurrentRoute(item.route); setSidebarOpen(false); }} color={item.color} bg={item.bg} />
          ))}
          <div className="pt-3 mt-3 border-t border-slate-100">
            <MenuLink icon={Settings} label="ตั้งค่าโปรไฟล์" active={currentRoute === 'settings'} onClick={() => { setCurrentRoute('settings'); setSidebarOpen(false); }} color="text-slate-600" bg="bg-slate-100 border-slate-200" />
          </div>
        </nav>

        <div className="p-4 bg-slate-50 border-t border-slate-200">
          <div className="flex items-center gap-3 mb-4">
            <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 flex items-center justify-center font-black text-white text-lg shadow-md border-2 border-white">
              {currentUser.name.charAt(0)}
            </div>
            <div className="truncate flex-1">
              <p className="text-sm font-black text-slate-800 truncate">{currentUser.name}</p>
              <p className="text-[9px] font-bold text-slate-500 bg-slate-200 inline-block px-2 py-0.5 rounded-md mt-0.5 uppercase tracking-widest">{currentUser.role === 'admin' ? 'ADMINISTRATOR' : currentUser.team}</p>
            </div>
          </div>
          <button onClick={() => setCurrentUser(null)} className="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl bg-white border-2 border-slate-200 text-slate-600 hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-all font-black text-sm shadow-sm">
            <LogOut size={16} /> ออกจากระบบ
  
  </script>
</body>
</html>
