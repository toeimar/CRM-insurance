<!DOCTYPE html>

<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova CRM - Insurance Sales Platform</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    .cscroll::-webkit-scrollbar { width: 5px; height: 5px; }
    .cscroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 99px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeUp .35s ease forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    .pulse { animation: pulse 2s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, ResponsiveContainer, Cell, AreaChart, Area } = Recharts;

    const ADMIN_EMAIL = "toei.mar168@gmail.com";
    const STATUS_LIST = ['ลีดใหม่', 'นัดหมาย', 'เสนอแบบ', 'ติดตามผล', 'ปิดการขาย'];
    const CHART_COLORS = ['#3b82f6', '#f97316', '#10b981', '#8b5cf6', '#ec4899'];

    const fmt = (val) => new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', maximumFractionDigits: 0 }).format(val || 0);
    const calcAge = (dob) => !dob ? 0 : Math.abs(new Date(Date.now() - new Date(dob).getTime()).getUTCFullYear() - 1970);
    const toBE = (dateStr) => {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()+543}`;
    };
    const today = () => new Date().toISOString().split('T')[0];

    async function callClaude(messages, sys = "") {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: sys, messages })
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      return d.content.map(i => i.text || "").join("\n");
    }

    // Icons (SVG inline)
    const Icon = ({ d, size = 16, className = "", stroke = "currentColor" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d={d}/>
      </svg>
    );

    const LockIcon = ({ size, className }) => <svg width={size||16} height={size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;

    const BriefcaseIcon = ({ size, className }) => <svg width={size||16} height={size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;

    // ─── MENU LINK ───────────────────────────────────────────
    function MenuLink({ icon: Ico, label, active, onClick, color, bg }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-all border-2 ${active ? `${bg} ${color} shadow-sm` : 'text-slate-500 hover:bg-slate-50 border-transparent hover:border-slate-100'}`}>
          <Ico size={17} className={active ? color : 'text-slate-400'} />
          {label}
        </button>
      );
    }

    // ─── AUTH ─────────────────────────────────────────────────
    function AuthView({ onAuth, users }) {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [name, setName] = useState('');
      const [team, setTeam] = useState('');

      const submit = (e) => {
        e.preventDefault();
        onAuth(email, password, name, team, isLogin);
      };

      const inp = "w-full pl-11 pr-4 py-3.5 rounded-xl bg-white border-2 border-slate-200 focus:border-blue-500 outline-none font-bold text-slate-800 transition";

      return (
        <div className="min-h-screen flex items-center justify-center p-4" style={{background:'linear-gradient(135deg,#0f172a,#1e1b4b,#0f172a)'}}>
          <div className="bg-white/95 rounded-3xl shadow-2xl p-8 w-full max-w-md border border-white/20">
            <div className="text-center mb-8">
              <div className="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl" style={{background:'linear-gradient(135deg,#2563eb,#4f46e5)'}}>
                <ActivityIcon className="text-white" size={32} />
              </div>
              <h2 className="text-3xl font-black text-slate-800">Nova CRM</h2>
              <p className="text-slate-400 font-bold mt-1 text-xs uppercase tracking-widest">Insurance Sales Platform</p>
            </div>
            <div className="flex bg-slate-100 p-1.5 rounded-2xl mb-6">
              <button type="button" onClick={() => setIsLogin(true)} className={`flex-1 py-2.5 font-black text-sm rounded-xl transition-all ${isLogin ? 'bg-white text-blue-600 shadow-md' : 'text-slate-500'}`}>เข้าสู่ระบบ</button>
              <button type="button" onClick={() => setIsLogin(false)} className={`flex-1 py-2.5 font-black text-sm rounded-xl transition-all ${!isLogin ? 'bg-white text-blue-600 shadow-md' : 'text-slate-500'}`}>ลงทะเบียน</button>
            </div>
            <form onSubmit={submit} className="space-y-4">
              <div>
                <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-1.5">อีเมล</label>
                <div className="relative">
                  <MailIcon className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={16}/>
                  <input required type="email" value={email} onChange={e => setEmail(e.target.value)} className={inp} placeholder="name@example.com" />
                </div>
              </div>
              {!isLogin && (
                <>
                  <div>
                    <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-1.5">ชื่อ - นามสกุล</label>
                    <div className="relative">
                      <UserIcon className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={16}/>
                      <input required type="text" value={name} onChange={e => setName(e.target.value)} className={inp} placeholder="ชื่อจริง นามสกุล" />
                    </div>
                  </div>
                  {email.toLowerCase() !== ADMIN_EMAIL.toLowerCase() && (
                    <div>
                      <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-1.5">ชื่อทีม</label>
                      <div className="relative">
                        <UsersIcon className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={16}/>
                        <input required type="text" value={team} onChange={e => setTeam(e.target.value)} className={inp} placeholder="เช่น ทีมมังกรทอง" />
                      </div>
                    </div>
                  )}
                </>
              )}
              <div>
                <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-1.5">รหัสผ่าน</label>
                <div className="relative">
                  <LockIcon className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={16}/>
                  <input required type="password" value={password} onChange={e => setPassword(e.target.value)} className={inp} placeholder="••••••••" />
                </div>
              </div>
              <button type="submit" className="w-full py-4 text-white font-black rounded-2xl shadow-xl transition-all hover:-translate-y-0.5 mt-2" style={{background:'linear-gradient(135deg,#2563eb,#4f46e5)'}}>
                {isLogin ? 'เข้าสู่ระบบ' : 'ลงทะเบียนและเริ่มต้น'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ─── AGENT HOME ───────────────────────────────────────────
    function AgentHome({ user, customers, tasks, addTask, toggleTask, removeTask, setUsers, users, updateCustomer, deleteCustomer }) {

function CustomerModal({ customer, onClose, onSave, onDelete }) {
  const [f, setF] = useState({...customer});
  const [aiLoading, setAiLoading] = useState(false);
  const [aiInsight, setAiInsight] = useState(null);
  const [aiError, setAiError] = useState(null);

  const ch = (e) => {
    const {name, value, type, checked} = e.target;
    const v = type==='checkbox' ? checked : value;
    if (name==='dob') setF(p => ({...p, [name]:v, age:calcAge(v)}));
    else setF(p => ({...p, [name]:v}));
  };

  const save = () => {
    const up = {...f};
    if (up.status==='ปิดการขาย' && customer.status!=='ปิดการขาย') up.closedDate = today();
    up.lastContact = today();
    onSave(up);
    onClose();
  };

  const genAI = async () => {
    setAiLoading(true); setAiInsight(null); setAiError(null);
    try {

// ─── ANALYTICS ────────────────────────────────────────────
function AnalyticsView({ customers }) {
  const now = new Date();
  const cm = now.getMonth(), cy = now.getFullYear();
  const closed = customers.filter(c => c.status === 'ปิดการขาย');
  const closedMonth = closed.filter(c => c.closedDate && new Date(c.closedDate).getMonth()===cm && new Date(c.closedDate).getFullYear()===cy);
  const closedYear = closed.filter(c => c.closedDate && new Date(c.closedDate).getFullYear()===cy);
  const revMonth = closedMonth.reduce((a,c) => a+Number(c.premium||0), 0);
  const revYear = closedYear.reduce((a,c) => a+Number(c.premium||0), 0);
  const convRate = customers.length ? Math.round((closed.length / customers.length) * 100) : 0;

  const mNames = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const monthly = mNames.map((name, i) => ({
    name, revenue: closedYear.filter(c => new Date(c.closedDate).getMonth()===i).reduce((a,c)=>a+Number(c.premium||0),0)
  }));

  const kpis = [
    { title: 'รายได้เดือนนี้', val: fmt(revMonth), color: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-200' },
    { title: 'รายได้ทั้งปี', val: fmt(revYear), color: 'text-indigo-600', bg: 'bg-indigo-50', border: 'border-indigo-200' },
    { title: 'เคสปิด (เดือนนี้)', val: `${closedMonth.length} เคส`, color: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-200' },
    { title: 'Conversion Rate', val: `${convRate}%`, color: 'text-orange-600', bg: 'bg-orange-50', border: 'border-orange-200' },
  ];

  return (
    <div className="space-y-8 fade-in">
      <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3"><TrendingUpIcon className="text-pink-500" size={32}/> Analytics & KPI</h2>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        {kpis.map((k,i) => (
          <div key={i} className={`p-5 rounded-2xl border-2 ${k.border} ${k.bg} shadow-sm`}>
            <p className="text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">{k.title}</p>
            <h3 className={`text-xl font-black ${k.color}`}>{k.val}</h3>
          </div>
        ))}
      </div>
      <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100" style={{height:'320px'}}>
          <h3 className="font-black text-slate-800 mb-4">รายได้รายเดือน</h3>
          <ResponsiveContainer width="100%" height="85%">
            <AreaChart data={monthly}>
              <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
              <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill:'#94a3b8',fontWeight:'700',fontSize:11}}/>
              <RechartsTooltip contentStyle={{borderRadius:'16px',border:'none',fontWeight:'bold'}} formatter={v=>[fmt(v),'รายได้']}/>
              <Area type="monotone" dataKey="revenue" stroke="#3b82f6" strokeWidth={3} fill="#3b82f620"/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100" style={{height:'320px'}}>
          <h3 className="font-black text-slate-800 mb-4">ลูกค้าในแต่ละขั้นตอน</h3>
          <ResponsiveContainer width="100%" height="85%">
            <BarChart data={STATUS_LIST.map(s=>({name:s,count:customers.filter(c=>c.status===s).length}))}>
              <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
              <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill:'#94a3b8',fontWeight:'700',fontSize:10}}/>
              <RechartsTooltip contentStyle={{borderRadius:'16px',border:'none',fontWeight:'bold'}}/>
              <Bar dataKey="count" radius={[10,10,0,0]}>{STATUS_LIST.map((_,i)=><Cell key={i} fill={CHART_COLORS[i%CHART_COLORS.length]}/>)}</Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

// ─── AI ASSISTANT ─────────────────────────────────────────
function AIAssistantView({ user, customers }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  const sys = `คุณเป็น AI Assistant ตัวแทนประกัน "${user.name}" ทีม ${user.team}. ลูกค้าในมือ: ${customers.length} ราย. ตอบภาษาไทย กระชับ นำไปปฏิบัติได้จริง เหมือนโค้ชการขายมืออาชีพ`;
  const quick = ["สคริปต์โทรหาลูกค้าใหม่","เทคนิค Follow-up ลูกค้า","วิธีนำเสนอประกันโดยไม่กดดัน","จุดเด่นประกันสะสมทรัพย์"];

  useEffect(() => { endRef.current?.scrollIntoView({behavior:'smooth'}); }, [messages]);

  const send = async (txt) => {
    const text = txt || input.trim();
    if (!text || loading) return;
    setInput('');
    const newMsgs = [...messages, {role:'user',content:text}];
    setMessages(newMsgs);
    setLoading(true);
    try {
      const reply = await callClaude(newMsgs.map(m=>({role:m.role,content:m.content})), sys);
      setMessages(p => [...p, {role:'assistant',content:reply}]);
    } catch(e) {
      setMessages(p => [...p, {role:'assistant',content:'❌ ไม่สามารถเชื่อมต่อได้'}]);
    }
    setLoading(false);
  };

  return (
    <div className="max-w-4xl mx-auto space-y-4 fade-in">
      <div className="flex items-center gap-4">
        <div className="w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg" style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)'}}>
          <BrainIcon className="text-white" size={24}/>
        </div>
        <div>
          <h2 className="text-2xl font-black text-slate-800">AI Sales Assistant</h2>
          <p className="text-slate-400 font-bold text-xs uppercase tracking-widest">ขับเคลื่อนด้วย Claude AI</p>
        </div>
      </div>
      <div className="rounded-3xl overflow-hidden shadow-2xl" style={{background:'linear-gradient(135deg,#0f172a,#1e1b4b)'}}>
        <div className="cscroll p-6 space-y-4" style={{height:'420px',overflowY:'auto'}}>
          {messages.length === 0 && (
            <div className="flex flex-col items-center justify-center h-full text-center gap-4">
              <BrainIcon size={48} className="text-indigo-400 opacity-40"/>
              <p className="text-white font-black text-xl">สวัสดีคุณ {user.name}! 👋</p>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 w-full max-w-xl">
                {quick.map((p, i) => (
                  <button key={i} onClick={() => send(p)} className="text-left p-3 rounded-2xl text-indigo-200 text-xs font-bold border" style={{background:'rgba(99,102,241,.1)',borderColor:'rgba(99,102,241,.3)'}}>
                    {p}
                  </button>
                ))}
              </div>
            </div>
          )}
          {messages.map((m, i) => (
            <div key={i} className={`flex gap-3 ${m.role==='user'?'flex-row-reverse':''}`}>
              <div className={`w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center font-black text-sm text-white ${m.role==='user'?'bg-blue-500':''}`} style={m.role!=='user'?{background:'linear-gradient(135deg,#4f46e5,#7c3aed)'}:{}}>
                {m.role==='user' ? user.name.charAt(0) : <BotIcon size={14}/>}
              </div>
              <div className={`max-w-[80%] p-4 rounded-2xl text-sm font-bold leading-relaxed whitespace-pre-wrap ${m.role==='user'?'bg-blue-600 text-white':'text-indigo-50 border'}`} style={m.role!=='user'?{background:'rgba(255,255,255,.08)',borderColor:'rgba(255,255,255,.1)'}:{}}>
                {m.content}
              </div>
            </div>
          ))}
          {loading && (
            <div className="flex gap-3 items-start">
              <div className="w-8 h-8 rounded-full flex items-center justify-center text-white" style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)'}}><BotIcon size={14}/></div>
              <div className="p-4 rounded-2xl border flex items-center gap-3" style={{background:'rgba(255,255,255,.08)',borderColor:'rgba(255,255,255,.1)'}}>
                <div className="w-5 h-5 border-2 border-indigo-400 border-t-transparent rounded-full spin"></div>
                <span className="text-indigo-300 font-bold text-sm">กำลังคิด...</span>
              </div>
            </div>
          )}
          <div ref={endRef}/>
        </div>
        <div className="border-t p-4" style={{borderColor:'rgba(99,102,241,.2)',background:'rgba(0,0,0,.2)'}}>
          <div className="flex gap-3">
            <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key==='Enter'&&!e.shiftKey&&send()} placeholder="ถามเกี่ยวกับการขายประกัน..." disabled={loading}
              className="flex-1 px-5 py-3.5 rounded-2xl outline-none font-bold text-sm text-white placeholder-indigo-400 border" style={{background:'rgba(255,255,255,.08)',borderColor:'rgba(255,255,255,.15)'}}/>
            <button onClick={() => send()} disabled={loading||!input.trim()} className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white px-6 py-3.5 rounded-2xl font-black">
              <SendIcon size={16}/>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

    rev: customers.filter(c=>c.agent_id===a.id&&c.status==='ปิดการขาย').reduce((a,c)=>a+Number(c.premium||0),0),
    leads: customers.filter(c=>c.agent_id===a.id).length
  })).sort((a,b)=>b.rev-a.rev);

  return (
    <div className="space-y-8 fade-in">
      <div className="rounded-3xl p-8 text-white shadow-2xl" style={{background:'linear-gradient(135deg,#0f172a,#4c1d95,#0f172a)'}}>

        <div className="grid grid-cols-2 md:grid-cols-4 gap-5">
          {[
            { label: 'ยอดขายรวม', val: fmt(totalRev), color: 'text-amber-400' },
            { label: 'ตัวแทนในระบบ', val: `${agents.length} คน`, color: 'text-blue-300' },
            { label: 'ฐานลูกค้า', val: `${customers.length} ราย`, color: 'text-purple-300' },
            { label: 'ปิดการขาย', val: `${closed.length} เคส`, color: 'text-emerald-400' },
          ].map((item, i) => (
            <div key={i} className="p-5 rounded-2xl border border-white/20" style={{background:'rgba(255,255,255,.1)'}}>
              <p className="text-purple-200 text-xs font-black mb-1 uppercase tracking-widest">{item.label}</p>
              <h3 className={`text-2xl font-black ${item.color}`}>{item.val}</h3>
            </div>
          ))}
        </div>
      </div>
      <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-6">
        <h3 className="font-black text-slate-800 text-xl mb-5 flex items-center gap-2"><UsersIcon className="text-blue-500" size={22}/> ตัวแทนทั้งหมด</h3>
        <div className="overflow-x-auto">
          <table className="w-full text-left text-sm">
            <thead><tr className="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest"><th className="px-4 py-3 rounded-l-xl">ชื่อ</th><th className="px-4 py-3">ทีม</th><th className="px-4 py-3">Lead</th><th className="px-4 py-3 rounded-r-xl">ยอดขาย</th></tr></thead>
            <tbody className="divide-y divide-slate-50">
              {stats.map((a,i) => (
                <tr key={i} className="hover:bg-slate-50/50">
                  <td className="px-4 py-3.5 font-black text-slate-800">{a.name}</td>
                  <td className="px-4 py-3.5"><span className="px-2 py-1 bg-purple-50 text-purple-700 rounded-lg font-black text-xs">{a.team}</span></td>
                  <td className="px-4 py-3.5 font-black text-slate-600">{a.leads}</td>
                  <td className="px-4 py-3.5 font-black text-emerald-600">{fmt(a.rev)}</td>
                </tr>
              ))}
              {agents.length === 0 && <tr><td colSpan={4} className="px-4 py-8 text-center text-slate-400 font-bold">ยังไม่มีตัวแทน</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

      </main>
    </div>

// ─── MAIN ─────────────────────────────────────────────────
function App() {
  const [users, setUsers] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [currentUser, setCurrentUser] = useState(null);
  const [currentRoute, setCurrentRoute] = useState('home');
  const [isSidebarOpen, setSidebarOpen] = useState(false);

  const handleAuth = (email, password, name, team, isLogin) => {
    if (isLogin) {
      const user = users.find(u=>u.email.toLowerCase()===email.toLowerCase()&&u.password===password);
      if (user) { setCurrentUser(user); setCurrentRoute('home'); }
      else alert("รหัสผ่านหรืออีเมลไม่ถูกต้อง");
    } else {
      if (users.find(u=>u.email.toLowerCase()===email.toLowerCase())) { alert("อีเมลนี้มีการลงทะเบียนแล้ว"); return; }
      const role = email.toLowerCase()===ADMIN_EMAIL.toLowerCase() ? 'admin' : 'agent';
      const newUser = { id:Date.now().toString(), name, email, password, team:role==='admin'?'HQ Management':team, role, targetRevenue:100000 };
      setUsers(prev=>[...prev,newUser]);
      setCurrentUser(newUser);
      setCurrentRoute('home');
    }
  };

  useEffect(() => {
    if (currentUser) {
      const updated = users.find(u=>u.id===currentUser.id);
      if (updated) setCurrentUser(updated);
    }
  }, [users]);

  const addCustomer = (data) => setCustomers(prev=>[...prev,{...data,id:Date.now().toString(),agent_id:currentUser.id}]);
  const updateCustomer = (data) => setCustomers(prev=>prev.map(c=>c.id===data.id?data:c));
  const deleteCustomer = (id) => setCustomers(prev=>prev.filter(c=>c.id!==id));
  const addTask = (data) => setTasks(prev=>[...prev,{...data,id:Date.now().toString(),agent_id:currentUser.id}]);
  const toggleTask = (id) => setTasks(prev=>prev.map(t=>t.id===id?{...t,status:t.status==='completed'?'pending':'completed'}:t));
  const removeTask = (id) => setTasks(prev=>prev.filter(t=>t.id!==id));

  if (!currentUser) return <AuthView onAuth={handleAuth} users={users}/>;

  return (
    <AppShell
      currentUser={currentUser} users={users} customers={customers} tasks={tasks}
      addCustomer={addCustomer} updateCustomer={updateCustomer} deleteCustomer={deleteCustomer}
      addTask={addTask} toggleTask={toggleTask} removeTask={removeTask}
      setUsers={setUsers} currentRoute={currentRoute} setCurrentRoute={setCurrentRoute}
      setSidebarOpen={setSidebarOpen} isSidebarOpen={isSidebarOpen}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
